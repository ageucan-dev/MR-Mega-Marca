name: Build static site

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Next.js static export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create Hostinger ZIP
        run: |
          cd out
          zip -r ../site-hostinger.zip .

      - name: Upload Hostinger ZIP
        uses: actions/upload-artifact@v4
        with:
          name: site-hostinger
          path: site-hostinger.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload public_html folder
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-public-html
          path: out/
          if-no-files-found: error
          retention-days: 7
